---
# Namespace
apiVersion: v1
kind: Namespace
metadata:
  name: chat-app

---
# MongoDB Storage
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mongodb-storage
  namespace: chat-app
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi

---
# MongoDB Pod
apiVersion: v1
kind: Pod
metadata:
  name: mongodb
  namespace: chat-app
  labels:
    app: mongodb
spec:
  containers:
    - name: mongodb
      image: mongo:latest
      args: ["--bind_ip_all"]
      ports:
        - containerPort: 27017
      volumeMounts:
        - name: storage
          mountPath: /data/db
  volumes:
    - name: storage
      persistentVolumeClaim:
        claimName: mongodb-storage

---
# MongoDB Service
apiVersion: v1
kind: Service
metadata:
  name: mongodb
  namespace: chat-app
spec:
  type: ClusterIP
  selector:
    app: mongodb
  ports:
    - port: 27017
      targetPort: 27017

---
# Server Pod
apiVersion: v1
kind: Pod
metadata:
  name: server
  namespace: chat-app
  labels:
    app: server
spec:
  initContainers:
    - name: wait-for-mongodb
      image: busybox:1.36
      command:
        [
          "sh",
          "-c",
          'until nc -z -v -w3 mongodb 27017; do echo "Waiting for MongoDB..."; sleep 2; done; echo "MongoDB is up!"',
        ]
  containers:
    - name: server
      image: chat-server:latest
      imagePullPolicy: Never
      ports:
        - containerPort: 5000
      env:
        - name: MONGODB_URI
          value: "mongodb://mongodb:27017/chat-app"

---
# Server Service
apiVersion: v1
kind: Service
metadata:
  name: server
  namespace: chat-app
spec:
  type: NodePort
  selector:
    app: server
  ports:
    - port: 5000
      targetPort: 5000
      nodePort: 30000

---
# Client Pod
apiVersion: v1
kind: Pod
metadata:
  name: client
  namespace: chat-app
  labels:
    app: client
spec:
  containers:
    - name: client
      image: chat-client:latest
      imagePullPolicy: Never
      ports:
        - containerPort: 5173

---
# Client Service
apiVersion: v1
kind: Service
metadata:
  name: client
  namespace: chat-app
spec:
  type: NodePort
  selector:
    app: client
  ports:
    - port: 5173
      targetPort: 5173
      nodePort: 30173
